apiVersion: apps/v1
kind: Deployment
metadata:
  name: xception-consumer
  namespace: mlops-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xception-consumer
  template:
    metadata:
      labels:
        app: xception-consumer
    spec:
      imagePullSecrets:
      - name: harbor-registry-secret
      containers:
      - name: xception-consumer
        image: 100.112.196.74:30002/mlops-core/xception-consumer:44d592b
        imagePullPolicy: Always
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"